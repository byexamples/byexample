name: test
on: [pull_request]
jobs:
  byexample-linux-test:
    name: "Byexample Python (ver: ${{ matrix.python-version }}) (os: ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            python-version: ["3.7.17", "3.8.18", "3.9.25", "3.10.20", "3.11.15", "3.12.13", "3.13.12", "3.14.3"]
            os: [ubuntu-22.04]
    env:
        TERM: xterm-color
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: setup.py
      - run: make deps-dev
      - run: make install-from-pkg-tgz
      - run: make lib-test
      - run: make modules-test
      - run: make docs-test
      - run: make examples-test
      - run: make corner-test

  byexample-mac-test:
    name: "Byexample Python (ver: ${{ matrix.python-version }}) (os: ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            python-version: ["3.12", "3.13", "3.14"]
            os: [macos-26-intel]
    env:
        TERM: xterm-color
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: setup.py
      - run: make deps-dev
      - run: make install-from-pkg-tgz
      - run: make lib-test
      - run: make modules-test
      - run: make docs-test
      - run: make examples-test
      - run: make corner-test

  source-code-test:
    name: "Source code"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.7.17"
          cache: 'pip'
          cache-dependency-path: setup.py
      - run: make deps-dev
      - run: make format-test

  github-pages-test:
    name: "Github Pages test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - run: make index-links-test
      - run: ./test/github-pages.sh

  lang-python-test:
    name: "Lang Python test (ver: ${{ matrix.python-version }}) (os: ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            python-version: ["3.11.15", "3.12.13", "3.13.12", "3.14.3"]
            os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: setup.py
      - run: make deps-dev
      - run: make install-from-pkg-tgz
      - run: make lang-python-test


  lang-pwsh-test:
    name: "Lang PowerShell test (ver: latest) (os: ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            os: [ubuntu-22.04, macos-26-intel]
            include:
                - os: ubuntu-22.04
                  python-version: "3.7.17"
                - os: macos-26-intel
                  python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: setup.py
      - run: make deps-dev
      - run: make install-from-pkg-tgz
      - run: make lang-pwsh-test


  lang-shell-test:
    name: "Lang Shell test (ver: latest) (os: ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            os: [ubuntu-22.04, macos-26-intel]
            include:
                - os: ubuntu-22.04
                  python-version: "3.7.17"
                - os: macos-26-intel
                  python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: setup.py
      - run: make deps-dev
      - run: make install-from-pkg-tgz
      - run: make lang-shell-test


